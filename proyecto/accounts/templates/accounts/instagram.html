{% load static %}


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'accounts/bulonexIcono.ico' %}">
    <title>Bulonex</title>
    <style>
    
    *{
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #fafafa;
        min-height: 100vh;
    }


    header {
        position: relative;
        display: flex;
        top: 0;
        width: 100%;
        background: #1f2937;
        color: white;
        padding: 10px 20px;
        justify-content: space-between;
        align-items: center;
    }

    header h1 {
        margin: 0;
        font-size: 20px;
        color: #f59e0b;
        }

    .container {
        max-width: 600px;
        margin: 80px auto 20px;
        }

    .post {
        background: white;
        border: 1px solid #ddd;
        border-radius: 10px;
        margin-bottom: 20px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

    .post-header {
        display: flex;
        align-items: center;
        padding: 10px;
    }

    .post-header img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 10px;
    }

    .post img {
    width: 100%;
    height: auto;
    }

    .post-content {
    padding: 10px;
    }

    .actions {
    display: flex;
    gap: 15px;
    padding: 10px;
    font-size: 18px;
    }

    .actions span {
    cursor: pointer;
    }

    .footer {
    text-align: center;
    padding: 15px;
    color: #777;
    }

    .stories {
    display: flex;
    overflow-x: auto;
    padding: 10px;
    gap: 10px;
    }

    .story {
    text-align: center;
    }

    .story img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 3px solid #f59e0b;
    }
</style>
</head>
<body>

    </div>

    <div>Herramientas</div>
    </div>
    <div class="story">

</div>

</div>

</html>
